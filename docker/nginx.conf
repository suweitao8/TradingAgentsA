server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # API 反向代理 - 转发到后端 FastAPI 服务
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE/长连接支持（分析进度推送等）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # WebSocket 支持（实时通知）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Main location - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS chunks：基于内容哈希命名，文件缺失说明构建已更新、浏览器缓存了旧 hash。
    # 必须返回 404（而非回退 index.html），否则浏览器会把 HTML 当 JS 模块解析，
    # 触发模块加载错误；前端 router.onError 检测到 chunk 错误后会自动整页刷新拉取最新版本。
    location ~* ^/js/.*\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS chunks：同上，缺失时返回 404 而非回退 HTML
    location ~* ^/css/.*\.css$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static assets
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html - no cache
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Health check endpoint
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}